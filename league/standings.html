<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Team Standings · Bramblett Tennis League</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;900&family=DM+Sans:wght@300;400;500;600&family=Bebas+Neue&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../css/styles.css">
</head>
<body class="page-body" data-page="standings" data-base="../" id="bgta-shell">

<section id="standings" style="padding-top:90px">
  <div class="container">
    <div class="section-header reveal">
      <div class="section-tag">Season 3 BTL 2026 · Team Standings</div>
      <h2 class="section-title">League <span class="highlight">Dashboard</span></h2>
    </div>
    <div style="display:flex;align-items:center;gap:12px;margin-bottom:12px">
      <label style="font-weight:600;color:var(--muted);">Filter:</label>
      <select id="standingsWeekFilter" onchange="(function(){ const v=this.value; currentWeekFilter = v==='overall'?null:parseInt(v,10); renderStandings(); }).call(this)" style="padding:8px;border-radius:6px">
        <option value="overall">Overall (All Weeks)</option>
        <option value="1">Week 1</option>
        <option value="2">Week 2</option>
        <option value="3">Week 3</option>
        <option value="4">Week 4</option>
        <option value="5">Week 5</option>
      </select>
      <button class="btn-sm gold" onclick="recomputeStandingsFromHistory()" style="margin-left:8px">Recompute Standings</button>
      <div style="color:var(--muted);font-size:.9rem;margin-left:auto">Each match = 3 points · Season max = 15 pts</div>
    </div>
    <div id="standingsWrap"></div>
  </div>
</section>

<script src="../js/config.js"></script>
<script src="../js/season3-data.js"></script>
<script src="../js/store.js"></script>
<script src="../js/match-lineup.js"></script>
<script src="../js/layout.js"></script>
<script src="../js/app.js"></script>
<script src="../js/pages/standings.js"></script>
</body>
</html>
